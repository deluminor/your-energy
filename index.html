<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Energy</title>
    <meta
      name="description"
      content="Your Energy — catalog of fitness exercises with filters, favorites and daily motivation."
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <header class="header">
      <div class="container" data-component="header"></div>
    </header>

    <main>
      <section class="hero">
        <div class="container" data-component="hero"></div>
      </section>

      <section class="exercises">
        <div class="container">
          <div class="exercises__head">
            <h2 class="exercises__title"></h2>
            <div data-component="filters"></div>
          </div>

          <div class="exercises__body">
            <aside class="exercises__aside">
              <div data-component="quote"></div>
              <div data-component="daily-norm"></div>
            </aside>

            <div class="exercises__content">
              <div data-component="category-list"></div>
              <div data-component="pagination"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container" data-component="footer"></div>
    </footer>

    <div id="modal-root"></div>

    <button
      class="scroll-up"
      data-component="scroll-up"
      type="button"
      hidden
    ></button>

    <script type="module" src="/src/pages/home.js"></script>
  </body>
</html>
