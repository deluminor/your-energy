<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Energy — Favorites</title>
    <meta
      name="description"
      content="Your favorite exercises from the Your Energy catalog."
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <header class="header">
      <div class="container" data-component="header"></div>
    </header>

    <main>
      <section class="favorites">
        <div class="container">
          <h1 class="favorites__title">Favorites</h1>

          <div class="favorites__body">
            <aside class="favorites__aside">
              <div data-component="quote"></div>
              <div data-component="daily-norm"></div>
            </aside>

            <div data-component="favorites-list"></div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container" data-component="footer"></div>
    </footer>

    <div id="modal-root"></div>

    <button
      class="scroll-up"
      data-component="scroll-up"
      type="button"
      hidden
    ></button>

    <script type="module" src="/src/pages/favorites.js"></script>
  </body>
</html>
